<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Projesi</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        fetch('/api/v1/todos', { method: 'GET' })
            .then(response => {
                if (response.status === 401) {
                    window.location.replace("/login.html");
                }
            })
            .catch(err => console.error("Yetki kontrolü sırasında hata:", err));
    </script>
</head>
<body>
    <button id="logoutBtn" onclick="performLogout()">Çıkış Yap</button>
    <div class="ust-bilgi">
        <div class="karsilama-alani">
            <div id="karsilama">Hoş geldin, <span id="kullaniciAdi">...</span> 👋</div>
            <div id="tarihSaat">
                <span id="tarih"></span> <br> <span id="saat"></span>
            </div>
        </div>
        
        <div class="ilerleme-kutusu">
            <div class="daire-dis" id="ilerlemeDairesi">
                <div class="daire-ic">
                    <span id="ilerlemeYuzde">%0</span>
                </div>
            </div>
            <div class="ilerleme-metin">Tamamlanan</div>
        </div>
    </div>
    <div class="konteynir">
        <h1>Görev Listesi</h1>
        <div class="ekleme-alani"> 
            <input type="text" id="gorevInput" placeholder="Yeni bir görev ekle...">
            <button id="ekleBtn">Ekle</button>
        </div>

        <div class="arama-alani">
            <input type="text" id="aramaInput" placeholder="Görevlerde ara...">
        </div>

        <ul id="gorevListesi"></ul>
    </div>

    <div id="editModal" class="modal"> 
        <div class="modal-icerik">
            <h3>Görevi Güncelle</h3>
            <input type="text" id="modalInput">
            <div class="modal-butonlar">
                <button onclick="modalKapat()" class="modal-iptal">İptal</button>
                <button id="modalKaydetBtn" class="modal-kaydet">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-icerik">
            <h3 style="color: #e74c3c;">Emin misiniz?</h3>
            <p>Bu görev kalıcı olarak silinecektir.</p>
            <div class="modal-butonlar">
                <button onclick="deleteModalKapat()" class="modal-iptal">İptal</button>
                <button id="modalSilBtn" class="modal-sil">Sil</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
